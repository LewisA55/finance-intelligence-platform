name: Deploy dashboard to GitHub Pages

# Builds the Atlas dashboard (Vite + DuckDB-WASM) from dashboard/ and publishes
# dashboard/dist to GitHub Pages. Pages must be enabled once in the repo:
#   Settings -> Pages -> Build and deployment -> Source: GitHub Actions.

on:
  pull_request:
    paths:
      - 'dashboard/**'
      - 'macros/export_saas_aggregates.sql'
      - 'macros/export_o2c_aggregates.sql'
      - '.github/workflows/deploy-dashboard.yml'
  push:
    branches: [main]
    paths:
      - 'dashboard/**'
      - 'macros/export_saas_aggregates.sql'
      - 'macros/export_o2c_aggregates.sql'
      - '.github/workflows/deploy-dashboard.yml'
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; cancel in-progress runs for the same ref.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run check

      - name: Configure Pages
        if: github.event_name != 'pull_request'
        uses: actions/configure-pages@v5

      - name: Upload artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard/dist

  deploy:
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
