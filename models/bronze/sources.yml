version: 2

sources:
  - name: bronze
    description: >
      DuckDB Bronze raw ingestion schema for Project Atlas. These sources are
      generated by scripts/warehouse/load_raw_to_duckdb.py from data/raw CSV
      files and validated by scripts/warehouse/bronze_validation_check.py.
      Source columns are preserved as VARCHAR and enriched with Atlas metadata.
    schema: bronze
    tables:
      - name: accounting__chart_of_accounts
        description: >
          Accounting source table loaded from chart of accounts.csv
          This table is part of the locked Bronze ingestion boundary.
        loaded_at_field: cast(_atlas_ingested_at as timestamp)
        columns:
          - name: _atlas_row_hash
            description: Deterministic MD5 fingerprint of the ordered original source row values using duckdb_json_array_v1.
            tests:
              - not_null
          - name: _atlas_ingested_at
            description: UTC timestamp of the Atlas Bronze load run.
            tests:
              - not_null
          - name: _atlas_source_file
            description: Origin CSV filename loaded into the Bronze table.
            tests:
              - not_null

      - name: accounting__control_findings_register
