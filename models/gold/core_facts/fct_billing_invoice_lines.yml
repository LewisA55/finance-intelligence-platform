version: 2

models:
  - name: fct_billing_invoice_lines
    description: >
      Gold billing invoice line fact for Project Atlas. This model is sourced
      from stg_billing__billing_invoice_lines and preserves the native invoice
      line grain: one row per invoice_line_id. It provides the commercial
      product/SKU/service-period engine underneath fct_billing_invoices. Invoice
      date is inherited from the parent invoice header because the Silver invoice
      line source does not expose invoice_date natively. Region is inherited
      through the conformed customer dimension. Product fields are retained as
      degenerate attributes because dim_product is not yet part of the locked
      Gold semantic spine. GL account is deliberately mapped to the UNASSIGNED
      account anchor because the line source does not expose account_code and no
      governed revenue-category-to-account mapping table currently exists.

    config:
      materialized: table
      schema: gold
      tags:
        - gold
        - core_fact
        - billing
        - o2c
        - invoice_lines

    columns:
      - name: billing_invoice_line_hk
        description: Deterministic hash key for the invoice line, derived from invoice_line_id.
        tests:
          - not_null
          - unique

      - name: invoice_line_pk
        description: Source-system invoice line primary key.
        tests:
          - not_null
          - unique

      - name: invoice_line_id
        description: Natural invoice line identifier. This defines the fact grain.
        tests:
          - not_null
          - unique

      - name: invoice_id
        description: Parent invoice identifier linking the line back to the billing invoice header.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('fct_billing_invoices')
                field: invoice_id

      - name: invoice_date_hk
        description: Parent invoice date hash key inherited from fct_billing_invoices.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_date')
                field: date_hk

      - name: service_period_start_date_hk
        description: Hash key linking service_period_start_date to gold.dim_date.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_date')
                field: date_hk

      - name: service_period_end_date_hk
        description: Hash key linking service_period_end_date to gold.dim_date.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_date')
                field: date_hk

      - name: customer_hk
        description: Hash key linking customer_id to gold.dim_customer.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_customer')
                field: customer_hk

      - name: region_hk
        description: Customer-derived region hash key inherited from gold.dim_customer.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_region')
                field: region_hk

      - name: gl_account_hk
        description: UNASSIGNED GL account hash key because billing invoice lines do not expose account_code.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_gl_account')
                field: gl_account_hk

      - name: customer_id
        tests:
          - not_null

      - name: subscription_id
        tests:
          - not_null

      - name: product_id
        tests:
          - not_null

      - name: invoice_date
        tests:
          - not_null

      - name: service_period_start_date
        tests:
          - not_null

      - name: service_period_end_date
        tests:
          - not_null

      - name: line_type
        tests:
          - not_null

      - name: revenue_category
        tests:
          - not_null

      - name: billing_frequency
        tests:
          - not_null

      - name: currency_code
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - GBP
                  - USD
                  - EUR
                  - SGD
                  - AUD
                  - CAD
                  - UNKNOWN

      - name: quantity
        tests:
          - not_null

      - name: unit_price_local
        tests:
          - not_null

      - name: line_amount_local
        tests:
          - not_null

      - name: unit_price_gbp
        tests:
          - not_null

      - name: line_amount_gbp
        tests:
          - not_null

      - name: local_line_rounding_delta
        tests:
          - not_null

      - name: gbp_line_rounding_delta
        tests:
          - not_null

      - name: invoice_status
        tests:
          - not_null

      - name: is_subscription_revenue
        tests:
          - not_null

      - name: is_recurring_saas_line
        tests:
          - not_null

      - name: is_legacy_subscription_line
        tests:
          - not_null

      - name: is_invalid_service_period
        tests:
          - not_null

      - name: is_orphan_invoice_line
        tests:
          - not_null

      - name: is_defect
        tests:
          - not_null

      - name: defect_type

      - name: created_date
        tests:
          - not_null

      - name: updated_date
        tests:
          - not_null

      - name: _atlas_row_hash
        tests:
          - not_null

      - name: _atlas_ingested_at
        tests:
          - not_null

      - name: _atlas_source_file
        tests:
          - not_null
