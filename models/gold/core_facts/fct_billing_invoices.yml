version: 2

models:
  - name: fct_billing_invoices
    description: >
      Gold billing invoice header fact for Project Atlas. This model is sourced
      from stg_billing__billing_invoices and preserves the native commercial
      invoice header grain: one row per invoice_id. It anchors billing activity
      into the conformed customer, region, and date spines. Region is derived
      through the conformed customer dimension and is not treated as a native
      invoice-header source attribute. The model preserves controlled billing
      defects such as duplicate invoices, tax calculation errors, payment term
      mismatches, currency mismatches, zero-value invoices, and invoices after
      churn for downstream audit and control marts.

    config:
      materialized: table
      schema: gold
      tags:
        - gold
        - core_fact
        - billing
        - o2c

    columns:
      - name: billing_invoice_hk
        description: Deterministic hash key for the invoice header, derived from invoice_id.
        tests:
          - not_null
          - unique

      - name: invoice_pk
        description: Source-system invoice primary key.
        tests:
          - not_null
          - unique

      - name: invoice_id
        description: Natural invoice identifier. This defines the fact grain.
        tests:
          - not_null
          - unique

      - name: invoice_date_hk
        description: Hash key linking invoice_date to gold.dim_date.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_date')
                field: date_hk

      - name: due_date_hk
        description: Hash key linking due_date to gold.dim_date.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_date')
                field: date_hk

      - name: billing_period_start_date_hk
        description: Hash key for the billing period start date.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_date')
                field: date_hk

      - name: billing_period_end_date_hk
        description: Hash key for the billing period end date.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_date')
                field: date_hk

      - name: customer_hk
        description: Hash key linking customer_id to gold.dim_customer.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_customer')
                field: customer_hk

      - name: region_hk
        description: Customer-derived region hash key inherited from gold.dim_customer.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_region')
                field: region_hk

      - name: customer_id
        tests:
          - not_null

      - name: invoice_date
        tests:
          - not_null

      - name: billing_period_start_date
        tests:
          - not_null

      - name: billing_period_end_date
        tests:
          - not_null

      - name: due_date
        tests:
          - not_null

      - name: payment_terms
        tests:
          - not_null

      - name: invoice_status
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - Issued
                  - Open
                  - Overdue
                  - Written Off

      - name: currency_code
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - GBP
                  - USD
                  - EUR
                  - SGD
                  - AUD
                  - CAD
                  - UNKNOWN

      - name: subtotal_amount_local
        tests:
          - not_null

      - name: tax_rate
        tests:
          - not_null

      - name: tax_amount_local
        tests:
          - not_null

      - name: total_billed_amount_local
        tests:
          - not_null

      - name: subtotal_amount_gbp
        tests:
          - not_null

      - name: tax_amount_gbp
        tests:
          - not_null

      - name: total_billed_amount_gbp
        tests:
          - not_null

      - name: local_invoice_rounding_delta
        tests:
          - not_null

      - name: gbp_invoice_rounding_delta
        tests:
          - not_null

      - name: is_issued_invoice
        tests:
          - not_null

      - name: is_open_invoice
        tests:
          - not_null

      - name: is_overdue_invoice
        tests:
          - not_null

      - name: is_written_off_invoice
        tests:
          - not_null

      - name: is_due_before_invoice_date
        tests:
          - not_null

      - name: is_invalid_billing_period
        tests:
          - not_null

      - name: source_system
        tests:
          - not_null

      - name: is_defect
        tests:
          - not_null

      - name: defect_type

      - name: created_date

      - name: updated_date

      - name: _atlas_row_hash
        tests:
          - not_null

      - name: _atlas_ingested_at
        tests:
          - not_null

      - name: _atlas_source_file
        tests:
          - not_null
