version: 2

models:
  - name: fct_deferred_revenue_rollforward
    description: >
      Gold fact table for the deferred revenue balance sheet rollforward in
      Project Atlas. This model is a faithful conformed representation of the
      Silver deferred revenue rollforward source. The grain is one row per
      rollforward_pk, with a native business grain of period_month + period_status
      + currency + revenue_category. The model intentionally does not include
      customer_hk or region_hk because the source rollforward is a corporate
      liability ledger rather than a customer-level subledger.

    config:
      materialized: table
      schema: gold
      tags:
        - gold
        - core_fact
        - revenue
        - deferred_revenue
        - rollforward
        - balance_sheet

    columns:
      - name: deferred_revenue_rollforward_hk
        description: Deterministic hash key generated from rollforward_pk.
        tests:
          - not_null
          - unique

      - name: rollforward_pk
        description: Source-system row key defining the fact grain.
        tests:
          - not_null
          - unique

      - name: period_month_date_hk
        description: Date hash key for the first day of the deferred revenue rollforward month.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_date')
                field: date_hk

      - name: gl_account_hk
        description: >
          Deferred revenue liability account hash key. Current source has
          revenue_category but no explicit account_code, so Subscription Revenue
          is mapped to account 2100 using a documented fallback rule; otherwise
          UNASSIGNED_GL_ACCOUNT.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_gl_account')
                field: gl_account_hk

      - name: mapped_account_code
        tests:
          - not_null

      - name: deferred_revenue_account_mapping_method
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - Deferred revenue category fallback
                  - Unassigned fallback

      - name: period_month
        tests:
          - not_null

      - name: period_status
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - Actual
                  - Scheduled

      - name: currency_code
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - GBP
                  - USD
                  - EUR
                  - SGD

      - name: revenue_category
        tests:
          - not_null

      - name: opening_deferred_revenue_local
        tests:
          - not_null

      - name: new_billings_deferred_local
        tests:
          - not_null

      - name: recognised_revenue_local
        tests:
          - not_null

      - name: closing_deferred_revenue_local
        tests:
          - not_null

      - name: opening_deferred_revenue_gbp
        tests:
          - not_null

      - name: new_billings_deferred_gbp
        tests:
          - not_null

      - name: recognised_revenue_gbp
        tests:
          - not_null

      - name: closing_deferred_revenue_gbp
        tests:
          - not_null

      - name: rollforward_variance_local
        description: >
          opening_deferred_revenue_local + new_billings_deferred_local -
          recognised_revenue_local - closing_deferred_revenue_local.
        tests:
          - not_null

      - name: rollforward_variance_gbp
        description: >
          opening_deferred_revenue_gbp + new_billings_deferred_gbp -
          recognised_revenue_gbp - closing_deferred_revenue_gbp.
        tests:
          - not_null

      - name: prior_closing_deferred_revenue_local

      - name: prior_closing_deferred_revenue_gbp

      - name: continuity_variance_local
        tests:
          - not_null

      - name: continuity_variance_gbp
        tests:
          - not_null

      - name: is_rollforward_arithmetic_exception
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - true
                  - false

      - name: is_period_continuity_exception
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - true
                  - false

      - name: is_negative_closing_deferred_revenue
        description: >
          Preserved exception flag for rows where closing deferred revenue is
          negative in either local or GBP currency. This is not hard-failed in
          the core fact because source profiling showed a preserved operational
          exception population.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - true
                  - false

      - name: is_actual_period
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - true
                  - false

      - name: is_scheduled_period
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - true
                  - false

      - name: is_defect
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - true
                  - false

      - name: defect_type

      - name: source_system
        tests:
          - not_null

      - name: created_date

      - name: updated_date

      - name: _atlas_row_hash
        tests:
          - not_null

      - name: _atlas_ingested_at
        tests:
          - not_null

      - name: _atlas_source_file
        tests:
          - not_null
