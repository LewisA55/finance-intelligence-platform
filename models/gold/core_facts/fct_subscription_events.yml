version: 2

models:
  - name: fct_subscription_events
    description: >
      Gold subscription event fact at one row per event_id. This model is the
      governed SaaS ARR movement ledger, preserving subscription lifecycle events
      and exposing ARR/MRR movement vectors for New, Expansion, Price Increase,
      Contraction, Churn, Pause and Renewal events. ARR identity breaks and
      missing subscription-master links are preserved as control telemetry rather
      than silently corrected.

    columns:
      - name: subscription_event_hk
        description: Deterministic hash key for the subscription lifecycle event.
        tests:
          - not_null
          - unique

      - name: event_id
        description: Source subscription lifecycle event identifier.
        tests:
          - not_null
          - unique

      - name: event_date_hk
        description: Conformed event date key.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_date')
                field: date_hk

      - name: customer_hk
        description: Conformed customer hash key.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_customer')
                field: customer_hk

      - name: region_hk
        description: Customer-derived conformed region hash key.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_region')
                field: region_hk

      - name: subscription_id
        description: Source subscription identifier.
        tests:
          - not_null

      - name: customer_id
        description: Source customer identifier.
        tests:
          - not_null

      - name: event_sequence
        description: Event sequence number within the subscription lifecycle.
        tests:
          - not_null

      - name: event_date
        description: Source event date.
        tests:
          - not_null

      - name: event_month_date
        description: Month-start date for subscription event reporting.
        tests:
          - not_null

      - name: event_type
        description: Controlled subscription lifecycle event type.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - New
                  - Renewal
                  - Expansion
                  - Contraction
                  - Price Increase
                  - Churn
                  - Pause

      - name: currency_code
        description: Event transaction currency code.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['GBP', 'USD', 'EUR', 'SGD']

      - name: previous_mrr_gbp
        description: MRR before the event in GBP.
        tests:
          - not_null

      - name: new_mrr_gbp
        description: MRR after the event in GBP.
        tests:
          - not_null

      - name: mrr_delta_gbp
        description: MRR movement caused by the event in GBP.
        tests:
          - not_null

      - name: previous_arr_gbp
        description: ARR before the event in GBP.
        tests:
          - not_null

      - name: new_arr_gbp
        description: ARR after the event in GBP.
        tests:
          - not_null

      - name: arr_delta_gbp
        description: ARR movement caused by the event in GBP.
        tests:
          - not_null

      - name: new_business_arr_gbp
        description: New business ARR movement in GBP.
        tests:
          - not_null

      - name: expansion_arr_gbp
        description: Existing customer expansion ARR movement in GBP.
        tests:
          - not_null

      - name: price_increase_arr_gbp
        description: Pricing-power ARR movement in GBP.
        tests:
          - not_null

      - name: gross_expansion_arr_gbp
        description: Expansion ARR plus price increase ARR in GBP.
        tests:
          - not_null

      - name: contraction_arr_gbp
        description: Contraction ARR loss stored as a positive waterfall amount.
        tests:
          - not_null

      - name: churn_arr_gbp
        description: Churn ARR loss stored as a positive waterfall amount.
        tests:
          - not_null

      - name: pause_arr_gbp
        description: Paused ARR stored as a positive waterfall amount.
        tests:
          - not_null

      - name: renewal_arr_delta_gbp
        description: ARR delta associated with renewal events, preserved as telemetry.
        tests:
          - not_null

      - name: net_arr_delta_gbp
        description: Signed ARR delta from the source event.
        tests:
          - not_null

      - name: net_mrr_delta_gbp
        description: Signed MRR delta from the source event.
        tests:
          - not_null

      - name: has_missing_subscription_master
        description: True when the event subscription_id does not link to the subscription master.
        tests:
          - not_null

      - name: arr_identity_variance_gbp
        description: Difference between previous ARR plus ARR delta and new ARR.
        tests:
          - not_null

      - name: mrr_identity_variance_gbp
        description: Difference between previous MRR plus MRR delta and new MRR.
        tests:
          - not_null

      - name: has_arr_identity_break
        description: True when ARR identity does not tie for the event.
        tests:
          - not_null

      - name: has_mrr_identity_break
        description: True when MRR identity does not tie for the event.
        tests:
          - not_null

      - name: is_defect
        description: Source defect flag preserved from Silver.
        tests:
          - not_null

      - name: source_system
        description: Source system that generated the subscription lifecycle event.
        tests:
          - not_null

      - name: _atlas_row_hash
        description: Bronze source row fingerprint preserved for Atlas lineage.
        tests:
          - not_null

      - name: _atlas_ingested_at
        description: Bronze ingestion timestamp preserved for Atlas lineage.
        tests:
          - not_null

      - name: _atlas_source_file
        description: Source file name preserved for Atlas lineage.
        tests:
          - not_null
