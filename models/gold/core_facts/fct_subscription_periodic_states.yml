version: 2

models:
  - name: fct_subscription_periodic_states
    description: >
      Gold subscription periodic state fact at one row per subscription_id and
      reporting_month_date. The model is an event-led commercial ARR/MRR
      run-rate state machine. It expands subscription lifecycle events into a
      monthly subscription spine, calculates beginning balances, monthly movement
      vectors, ending balances, active/churned/paused state flags, and continuity
      telemetry. It intentionally does not override event-led balances with
      subscription master current ARR, because churned and paused subscription
      master records preserve contractual/historical ARR while the event ledger
      controls run-rate movement.

    columns:
      - name: subscription_periodic_state_hk
        tests: [not_null, unique]
      - name: subscription_id
        tests: [not_null]
      - name: customer_hk
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_customer')
                field: customer_hk
      - name: region_hk
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_region')
                field: region_hk
      - name: reporting_month_date_hk
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_date')
                field: date_hk
      - name: reporting_month_date
        tests: [not_null]
      - name: beginning_arr_gbp
        tests: [not_null]
      - name: new_business_arr_gbp
        tests: [not_null]
      - name: expansion_arr_gbp
        tests: [not_null]
      - name: price_increase_arr_gbp
        tests: [not_null]
      - name: gross_expansion_arr_gbp
        tests: [not_null]
      - name: contraction_arr_gbp
        tests: [not_null]
      - name: churn_arr_gbp
        tests: [not_null]
      - name: pause_arr_gbp
        tests: [not_null]
      - name: renewal_arr_delta_gbp
        tests: [not_null]
      - name: net_arr_delta_gbp
        tests: [not_null]
      - name: ending_arr_gbp
        tests: [not_null]
      - name: beginning_mrr_gbp
        tests: [not_null]
      - name: net_mrr_delta_gbp
        tests: [not_null]
      - name: ending_mrr_gbp
        tests: [not_null]
      - name: active_arr_gbp
        tests: [not_null]
      - name: active_mrr_gbp
        tests: [not_null]
      - name: paused_arr_balance_gbp
        tests: [not_null]
      - name: event_count
        tests: [not_null]
      - name: is_churned_subscription_month
        tests: [not_null]
      - name: is_paused_subscription_month
        tests: [not_null]
      - name: is_active_subscription_month
        tests: [not_null]
      - name: has_subscription_event
        tests: [not_null]
      - name: has_arr_movement
        tests: [not_null]
      - name: has_terminal_event
        tests: [not_null]
      - name: has_arr_identity_break
        tests: [not_null]
      - name: has_mrr_identity_break
        tests: [not_null]
      - name: has_missing_subscription_master
        tests: [not_null]
      - name: arr_continuity_variance_gbp
        tests: [not_null]
      - name: mrr_continuity_variance_gbp
        tests: [not_null]
      - name: has_arr_continuity_break
        tests: [not_null]
      - name: has_mrr_continuity_break
        tests: [not_null]

      - name: has_negative_arr_balance
        description: True when the event-led ending ARR balance is negative, usually caused by contraction/churn events without sufficient prior ARR in the event trail.
        tests:
          - not_null

      - name: has_negative_mrr_balance
        description: True when the event-led ending MRR balance is negative, usually caused by contraction/churn events without sufficient prior MRR in the event trail.
        tests:
          - not_null  
