version: 2

models:
  - name: fct_vendor_invoice_lines
    description: >
      Gold fact table for vendor invoice lines in the Project Atlas Procurement /
      Accounts Payable pillar. The grain is one row per vendor_invoice_line_id.
      The model provides procurement spend attribution by vendor, parent invoice,
      expense GL account, service period and currency. It intentionally excludes
      department allocation and line-level tax because those fields are not
      present in the source. Tax and payment status are inherited from the
      vendor invoice header.

    config:
      materialized: table
      schema: gold
      tags:
        - gold
        - core_fact
        - procurement
        - ap
        - vendor_invoice_lines
        - p2p

    columns:
      - name: vendor_invoice_line_hk
        tests:
          - not_null
          - unique

      - name: vendor_invoice_line_pk
        tests:
          - not_null
          - unique

      - name: vendor_invoice_line_id
        tests:
          - not_null
          - unique

      - name: vendor_invoice_hk
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('fct_vendor_invoices')
                field: vendor_invoice_hk

      - name: vendor_invoice_id
        tests:
          - not_null

      - name: vendor_hk
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_vendor')
                field: vendor_hk

      - name: vendor_id
        tests:
          - not_null

      - name: vendor_name
        tests:
          - not_null

      - name: expense_gl_account_hk
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_gl_account')
                field: gl_account_hk

      - name: account_code
        tests:
          - not_null

      - name: expense_category
        tests:
          - not_null

      - name: invoice_date_hk
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_date')
                field: date_hk

      - name: due_date_hk
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_date')
                field: date_hk

      - name: posting_date_hk
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_date')
                field: date_hk

      - name: posting_period_date_hk
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_date')
                field: date_hk

      - name: service_period_start_date_hk
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_date')
                field: date_hk

      - name: service_period_end_date_hk
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_date')
                field: date_hk

      - name: invoice_number
        tests:
          - not_null

      - name: invoice_date
        tests:
          - not_null

      - name: due_date
        tests:
          - not_null

      - name: posting_date
        tests:
          - not_null

      - name: posting_period
        tests:
          - not_null

      - name: service_period_start_date
        tests:
          - not_null

      - name: service_period_end_date
        tests:
          - not_null

      - name: line_number
        tests:
          - not_null

      - name: line_description
        tests:
          - not_null

      - name: currency_code
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - GBP
                  - USD
                  - SGD

      - name: line_amount_local
        tests:
          - not_null

      - name: line_amount_gbp
        tests:
          - not_null

      - name: header_subtotal_local
        tests:
          - not_null

      - name: header_subtotal_gbp
        tests:
          - not_null

      - name: header_tax_amount_local
        tests:
          - not_null

      - name: header_tax_amount_gbp
        tests:
          - not_null

      - name: header_total_local
        tests:
          - not_null

      - name: header_total_gbp
        tests:
          - not_null

      - name: invoice_line_subtotal_local
        tests:
          - not_null

      - name: invoice_line_subtotal_gbp
        tests:
          - not_null

      - name: invoice_line_count
        tests:
          - not_null

      - name: invoice_subtotal_reconciliation_variance_local
        tests:
          - not_null

      - name: invoice_subtotal_reconciliation_variance_gbp
        tests:
          - not_null

      - name: payment_status
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - Paid
                  - Open
                  - Overdue

      - name: is_paid
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [true, false]

      - name: is_open
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [true, false]

      - name: is_overdue
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [true, false]

      - name: is_invalid_service_period
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [true, false]

      - name: is_line_defect
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [true, false]

      - name: line_defect_type

      - name: is_header_defect
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [true, false]

      - name: header_defect_type

      - name: is_header_duplicate_vendor_invoice
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [true, false]

      - name: is_header_ap_cutoff_failure
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [true, false]

      - name: has_ap_control_exception
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [true, false]

      - name: source_system
        tests:
          - not_null

      - name: created_date

      - name: updated_date

      - name: _atlas_row_hash
        tests:
          - not_null

      - name: _atlas_ingested_at
        tests:
          - not_null

      - name: _atlas_source_file
        tests:
          - not_null
