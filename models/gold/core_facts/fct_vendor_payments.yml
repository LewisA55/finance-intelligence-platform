version: 2

models:
  - name: fct_vendor_payments
    description: >
      Gold fact table for vendor cash disbursement events in the Project Atlas
      Procurement / Accounts Payable pillar. The grain is one row per
      vendor_payment_id. The model links payments to vendor invoice headers and
      vendors, conforms payment date and GL cash/AP control accounts, preserves
      payment method/reference/status, and exposes AP payment control telemetry.

    config:
      materialized: table
      schema: gold
      tags:
        - gold
        - core_fact
        - procurement
        - ap
        - vendor_payments
        - cash_out
        - p2p

    columns:
      - name: vendor_payment_hk
        tests:
          - not_null
          - unique

      - name: vendor_payment_pk
        tests:
          - not_null
          - unique

      - name: vendor_payment_id
        tests:
          - not_null
          - unique

      - name: vendor_invoice_hk
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('fct_vendor_invoices')
                field: vendor_invoice_hk

      - name: vendor_invoice_id
        tests:
          - not_null

      - name: vendor_hk
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_vendor')
                field: vendor_hk

      - name: vendor_id
        tests:
          - not_null

      - name: vendor_name
        tests:
          - not_null

      - name: payment_date_hk
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_date')
                field: date_hk

      - name: invoice_date_hk
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_date')
                field: date_hk

      - name: due_date_hk
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_date')
                field: date_hk

      - name: posting_date_hk
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_date')
                field: date_hk

      - name: posting_period_date_hk
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_date')
                field: date_hk

      - name: cash_account_hk
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_gl_account')
                field: gl_account_hk

      - name: ap_control_account_hk
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_gl_account')
                field: gl_account_hk

      - name: invoice_number
        tests:
          - not_null

      - name: header_invoice_number
        tests:
          - not_null

      - name: payment_date
        tests:
          - not_null

      - name: invoice_date
        tests:
          - not_null

      - name: due_date
        tests:
          - not_null

      - name: posting_date
        tests:
          - not_null

      - name: posting_period
        tests:
          - not_null

      - name: currency_code
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - GBP
                  - USD
                  - SGD

      - name: invoice_currency_code
        tests:
          - not_null

      - name: payment_amount_local
        tests:
          - not_null

      - name: payment_amount_gbp
        tests:
          - not_null

      - name: invoice_total_local
        tests:
          - not_null

      - name: invoice_total_gbp
        tests:
          - not_null

      - name: invoice_paid_amount_local
        tests:
          - not_null

      - name: invoice_paid_amount_gbp
        tests:
          - not_null

      - name: invoice_payment_count
        tests:
          - not_null

      - name: invoice_paid_vs_total_variance_local
        tests:
          - not_null

      - name: invoice_paid_vs_total_variance_gbp
        tests:
          - not_null

      - name: cash_account_code
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - "1010"
                  - "1020"
                  - "1040"

      - name: payment_method
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - Direct Debit
                  - Electronic Transfer
                  - Credit Card

      - name: payment_reference
        tests:
          - not_null

      - name: payment_status
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - Cleared

      - name: invoice_payment_status
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - Paid

      - name: is_invoice_paid
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [true, false]

      - name: is_invoice_open
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [true, false]

      - name: is_invoice_overdue
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [true, false]

      - name: is_positive_payment
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [true, false]

      - name: is_negative_payment
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [true, false]

      - name: is_zero_payment
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [true, false]

      - name: is_payment_exceeds_invoice_total
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [true, false]

      - name: is_orphan_vendor_invoice_payment
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [true, false]

      - name: is_payment_defect
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [true, false]

      - name: payment_defect_type

      - name: is_header_defect
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [true, false]

      - name: header_defect_type

      - name: is_header_duplicate_vendor_invoice
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [true, false]

      - name: is_header_ap_cutoff_failure
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [true, false]

      - name: has_ap_payment_control_exception
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [true, false]

      - name: source_system
        tests:
          - not_null

      - name: created_date

      - name: updated_date

      - name: _atlas_row_hash
        tests:
          - not_null

      - name: _atlas_ingested_at
        tests:
          - not_null

      - name: _atlas_source_file
        tests:
          - not_null
