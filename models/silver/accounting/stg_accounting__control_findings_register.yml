version: 2

models:
  - name: stg_accounting__control_findings_register
    description: >
      Silver staging model for the financial control findings register. This
      model stages formal control exceptions and remediation records created from
      failed or high-risk financial statement controls. It captures finding
      ownership, root cause, affected currencies, variance exposure, remediation
      timelines, lifecycle status, and Atlas Bronze lineage.

    config:
      materialized: view
      schema: silver
      tags:
        - silver
        - staging
        - accounting
        - control_findings

    columns:
      - name: finding_pk
        description: Stable primary key for the control finding record.
        tests:
          - not_null
          - unique

      - name: finding_id
        description: Human-readable finding identifier.
        tests:
          - not_null
          - unique

      - name: finding_title
        description: Concise title describing the control finding.
        tests:
          - not_null

      - name: finding_description
        description: Detailed narrative describing the control finding and business context.
        tests:
          - not_null

      - name: control_check
        description: Control check identifier that generated or supports the finding.
        tests:
          - not_null

      - name: control_category
        description: Category grouping of the related control.
        tests:
          - not_null

      - name: root_cause_category
        description: Root cause category assigned to the finding.
        tests:
          - not_null

      - name: financial_statement_area
        description: Financial statement area affected by the finding.
        tests:
          - not_null

      - name: owner_team
        description: Team responsible for investigating or remediating the finding.
        tests:
          - not_null

      - name: affected_currencies
        description: Pipe-delimited list of currencies affected by the finding.
        tests:
          - not_null

      - name: affected_currency_count
        description: Count of affected currencies.
        tests:
          - not_null

      - name: first_failed_period
        description: First posting period where the underlying control failed.
        tests:
          - not_null

      - name: latest_failed_period
        description: Latest posting period where the underlying control failed.
        tests:
          - not_null

      - name: failed_control_row_count
        description: Count of failed control rows consolidated into the finding.
        tests:
          - not_null

      - name: source_control_row_ids
        description: Pipe-delimited list of source control row identifiers supporting the finding.
        tests:
          - not_null

      - name: largest_variance_gbp
        description: Largest GBP variance observed across the failed control rows.
        tests:
          - not_null

      - name: latest_variance_gbp
        description: Latest GBP variance observed for the finding.
        tests:
          - not_null

      - name: risk_rating
        description: Business risk rating assigned to the finding.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - Low
                  - Medium
                  - High

      - name: severity
        description: Severity assigned by the control framework.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - INFO
                  - LOW
                  - MEDIUM
                  - HIGH

      - name: finding_status
        description: Lifecycle status of the finding.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - Open
                  - In Progress
                  - Remediated
                  - Closed
                  - Accepted Risk

      - name: remediation_action
        description: Planned or required remediation action.
        tests:
          - not_null

      - name: target_resolution_date
        description: Target date for finding remediation or formal disposition.
        tests:
          - not_null

      - name: source_dataset
        description: Source datasets involved in the finding.
        tests:
          - not_null

      - name: source_system
        description: Source system or generator responsible for the finding record.
        tests:
          - not_null

      - name: is_system_generated
        description: Boolean flag indicating whether the finding was generated by the Atlas source pipeline.
        tests:
          - not_null

      - name: created_date
        description: Source-system creation date parsed from Bronze VARCHAR.
        tests:
          - not_null

      - name: updated_date
        description: Source-system update date parsed from Bronze VARCHAR.
        tests:
          - not_null

      - name: _atlas_row_hash
        description: Bronze deterministic source-row fingerprint carried into Silver for lineage and drift analysis.
        tests:
          - not_null

      - name: _atlas_ingested_at
        description: UTC timestamp when the source row was loaded into Bronze.
        tests:
          - not_null

      - name: _atlas_source_file
        description: Origin CSV filename from the Bronze ingestion process.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - control_findings_register.csv
