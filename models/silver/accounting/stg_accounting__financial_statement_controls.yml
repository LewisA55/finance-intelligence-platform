version: 2

models:
  - name: stg_accounting__financial_statement_controls
    description: >
      Silver staging model for financial statement control execution results.
      This model stages the automated control matrix used to validate financial
      statement integrity, Trial Balance integrity, and subledger-to-ledger
      reconciliation checks. It applies defensive casting to control values,
      thresholds, control statuses, and operational metadata while preserving
      Atlas Bronze lineage.

    config:
      materialized: view
      schema: silver
      tags:
        - silver
        - staging
        - accounting
        - financial_controls

    columns:
      - name: control_pk
        description: Stable primary key for the financial statement control row.
        tests:
          - not_null
          - unique

      - name: posting_period
        description: Accounting posting period in YYYY-MM format.
        tests:
          - not_null

      - name: control_currency_scope
        description: >
          Currency or control-scope marker used by the financial statement control.
          Transaction-level controls may use currency codes such as GBP, USD, EUR,
          SGD, AUD, or CAD. Cross-ledger controls may use markers such as ALL or
          GBP_CONSOLIDATED.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - GBP
                  - USD
                  - EUR
                  - SGD
                  - AUD
                  - CAD
                  - ALL
                  - GBP_CONSOLIDATED

      - name: control_check
        description: Machine-readable control check identifier.
        tests:
          - not_null

      - name: control_category
        description: Control category grouping used for governance reporting.
        tests:
          - not_null

      - name: expected_value_local
        description: Expected control value in local currency.
        tests:
          - not_null

      - name: actual_value_local
        description: Actual observed control value in local currency.
        tests:
          - not_null

      - name: variance_value_local
        description: Signed local-currency variance between expected and actual values.
        tests:
          - not_null

      - name: absolute_variance_local
        description: Absolute local-currency variance used for threshold evaluation.
        tests:
          - not_null

      - name: expected_value_gbp
        description: Expected control value translated into GBP.
        tests:
          - not_null

      - name: actual_value_gbp
        description: Actual observed control value translated into GBP.
        tests:
          - not_null

      - name: variance_value_gbp
        description: Signed GBP variance between expected and actual values.
        tests:
          - not_null

      - name: absolute_variance_gbp
        description: Absolute GBP variance used for threshold evaluation.
        tests:
          - not_null

      - name: materiality_threshold
        description: Control materiality threshold used to classify pass/fail status.
        tests:
          - not_null

      - name: control_status
        description: Result status of the automated control check.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - PASS
                  - FAIL

      - name: severity
        description: Control severity assigned by the source generator.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - INFO
                  - LOW
                  - MEDIUM
                  - HIGH

      - name: source_dataset
        description: Source dataset used by the control check.
        tests:
          - not_null

      - name: description
        description: Human-readable explanation of the control check.
        tests:
          - not_null

      - name: is_system_generated
        description: Boolean flag indicating whether the control row was generated by the Atlas source pipeline.
        tests:
          - not_null

      - name: created_date
        description: Source-system creation date parsed from Bronze VARCHAR.
        tests:
          - not_null

      - name: updated_date
        description: Source-system update date parsed from Bronze VARCHAR.
        tests:
          - not_null

      - name: _atlas_row_hash
        description: Bronze deterministic source-row fingerprint carried into Silver for lineage and drift analysis.
        tests:
          - not_null

      - name: _atlas_ingested_at
        description: UTC timestamp when the source row was loaded into Bronze.
        tests:
          - not_null

      - name: _atlas_source_file
        description: Origin CSV filename from the Bronze ingestion process.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - financial_statement_controls.csv
