version: 2

models:
  - name: stg_accounting__financial_statement_extract
    description: >
      Silver staging model for the CFO-facing financial statement extract. This
      model reads the raw Bronze accounting__financial_statement_extract source,
      applies defensive casting to dates, sort keys, presentation amounts, sign
      multipliers, and calculation flags, while preserving Atlas Bronze lineage.
      The model represents the transition from Trial Balance accounting balances
      into Income Statement and Balance Sheet presentation structures.

    config:
      materialized: view
      schema: silver
      tags:
        - silver
        - staging
        - accounting
        - financial_statements

    columns:
      - name: financial_statement_pk
        description: Stable primary key for the financial statement extract row.
        tests:
          - not_null
          - unique

      - name: posting_period
        description: Accounting posting period in YYYY-MM format.
        tests:
          - not_null

      - name: period_start_date
        description: First calendar date of the posting period.
        tests:
          - not_null

      - name: period_end_date
        description: Final calendar date of the posting period.
        tests:
          - not_null

      - name: statement_type
        description: Financial statement type.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - Income Statement
                  - Balance Sheet

      - name: statement_type_sort
        description: Numeric sort order for statement type presentation.
        tests:
          - not_null

      - name: statement_section
        description: Financial statement section label.
        tests:
          - not_null

      - name: statement_section_sort
        description: Numeric sort order for financial statement sections.
        tests:
          - not_null

      - name: statement_line
        description: CFO-facing statement line label.
        tests:
          - not_null

      - name: statement_line_sort
        description: Numeric sort order for statement line presentation.
        tests:
          - not_null

      - name: account_code
        description: General ledger account code for source account rows. Calculated subtotal rows may be NULL.

      - name: account_name
        description: General ledger account name for source account rows. Calculated subtotal rows may be NULL.

      - name: account_class
        description: High-level accounting class for source account rows. Calculated subtotal rows may be labelled as Calculated.
        tests:
          - accepted_values:
              arguments:
                values:
                  - Asset
                  - Liability
                  - Equity
                  - Revenue
                  - Expense
              config:
                where: "is_calculated_line = false and account_class is not null"

      - name: currency
        description: Statement currency after uppercase normalisation.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - GBP
                  - USD
                  - EUR
                  - SGD

      - name: amount_local
        description: Presented financial statement amount in local currency.
        tests:
          - not_null

      - name: amount_gbp
        description: Presented financial statement amount translated into GBP.
        tests:
          - not_null

      - name: presentation_sign_multiplier
        description: Sign multiplier used to convert algebraic Trial Balance balances into presentation format.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - -1
                  - 1

      - name: is_calculated_line
        description: Boolean flag indicating whether the row is a calculated subtotal or bridge line.
        tests:
          - not_null

      - name: calculation_type
        description: Optional calculation classification for calculated statement lines.

      - name: source_system
        description: Source system that produced the financial statement extract.
        tests:
          - not_null

      - name: is_system_generated
        description: Boolean flag indicating whether the row was generated by the Atlas source pipeline.
        tests:
          - not_null

      - name: is_defect
        description: Boolean flag indicating whether the row is associated with an intentional source defect.
        tests:
          - not_null

      - name: defect_type
        description: Optional defect classification carried from the source layer.

      - name: created_date
        description: Source-system creation date parsed from Bronze VARCHAR.
        tests:
          - not_null

      - name: updated_date
        description: Source-system update date parsed from Bronze VARCHAR.
        tests:
          - not_null

      - name: _atlas_row_hash
        description: Bronze deterministic source-row fingerprint carried into Silver for lineage and drift analysis.
        tests:
          - not_null

      - name: _atlas_ingested_at
        description: UTC timestamp when the source row was loaded into Bronze.
        tests:
          - not_null

      - name: _atlas_source_file
        description: Origin CSV filename from the Bronze ingestion process.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - financial_statement_extract.csv
