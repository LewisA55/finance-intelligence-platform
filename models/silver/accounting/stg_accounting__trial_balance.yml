version: 2

models:
  - name: stg_accounting__trial_balance
    description: >
      Silver staging model for the ERP-style monthly Trial Balance extract. This
      model reads the raw Bronze accounting__trial_balance source, applies
      defensive casting to accounting dates, monetary balances, movement fields,
      and defect flags, and preserves Atlas Bronze lineage metadata. The grain is
      one row per posting_period, account_code, and currency.

    config:
      materialized: view
      schema: silver
      tags:
        - silver
        - staging
        - accounting
        - trial_balance

    columns:
      - name: trial_balance_pk
        description: Stable primary key for the trial balance row.
        tests:
          - not_null
          - unique

      - name: posting_period
        description: Accounting posting period in YYYY-MM format.
        tests:
          - not_null

      - name: period_start_date
        description: First calendar date of the posting period.
        tests:
          - not_null

      - name: period_end_date
        description: Final calendar date of the posting period.
        tests:
          - not_null

      - name: account_code
        description: General ledger account code.
        tests:
          - not_null

      - name: account_name
        description: General ledger account name.
        tests:
          - not_null

      - name: account_class
        description: High-level accounting class used for financial reporting and sign logic.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - Asset
                  - Liability
                  - Equity
                  - Revenue
                  - Expense

      - name: financial_statement
        description: Financial statement where the account is reported.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - Balance Sheet
                  - Income Statement

      - name: currency
        description: Trial Balance currency after uppercase normalisation.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - GBP
                  - USD
                  - EUR
                  - SGD

      - name: opening_balance_local
        description: Opening account balance in local currency.
        tests:
          - not_null

      - name: period_debits_local
        description: Period debit movement in local currency.
        tests:
          - not_null

      - name: period_credits_local
        description: Period credit movement in local currency.
        tests:
          - not_null

      - name: closing_balance_local
        description: Closing account balance in local currency.
        tests:
          - not_null

      - name: opening_balance_gbp
        description: Opening account balance translated into GBP.
        tests:
          - not_null

      - name: period_debits_gbp
        description: Period debit movement translated into GBP.
        tests:
          - not_null

      - name: period_credits_gbp
        description: Period credit movement translated into GBP.
        tests:
          - not_null

      - name: closing_balance_gbp
        description: Closing account balance translated into GBP.
        tests:
          - not_null

      - name: source_system
        description: Source system that produced the trial balance extract.
        tests:
          - not_null

      - name: is_system_generated
        description: Boolean flag indicating whether the row was generated by the Atlas source pipeline.
        tests:
          - not_null

      - name: is_defect
        description: Boolean flag indicating whether the row is associated with an intentional source defect.
        tests:
          - not_null

      - name: defect_type
        description: Optional defect classification carried from the source layer.

      - name: created_date
        description: Source-system creation date parsed from Bronze VARCHAR.
        tests:
          - not_null

      - name: updated_date
        description: Source-system update date parsed from Bronze VARCHAR.
        tests:
          - not_null

      - name: _atlas_row_hash
        description: Bronze deterministic source-row fingerprint carried into Silver for lineage and drift analysis.
        tests:
          - not_null

      - name: _atlas_ingested_at
        description: UTC timestamp when the source row was loaded into Bronze.
        tests:
          - not_null

      - name: _atlas_source_file
        description: Origin CSV filename from the Bronze ingestion process.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - trial_balance.csv
