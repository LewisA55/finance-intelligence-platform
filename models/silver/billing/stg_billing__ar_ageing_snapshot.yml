version: 2

models:
  - name: stg_billing__ar_ageing_snapshot
    description: >
      Silver staging model for the accounts receivable ageing snapshot. This
      model reads the raw Bronze billing__ar_ageing_snapshot source, applies
      defensive casting to snapshot, invoice and due dates, monetary balances,
      ageing metrics, dispute/write-off flags, defect flags, and operational
      dates while preserving Atlas Bronze lineage metadata. The grain is one row
      per invoice in the AR ageing snapshot.

    config:
      materialized: view
      schema: silver
      tags:
        - silver
        - staging
        - billing
        - ar_ageing

    columns:
      - name: snapshot_pk
        description: Stable primary key for the AR ageing snapshot row.
        tests:
          - not_null
          - unique

      - name: snapshot_date
        description: Date of the AR ageing snapshot.
        tests:
          - not_null

      - name: invoice_id
        description: Business invoice identifier linked to the invoice header.
        tests:
          - not_null

      - name: customer_id
        description: Customer identifier linked to the billing customer registry.
        tests:
          - not_null

      - name: invoice_date
        description: Date the invoice was issued.
        tests:
          - not_null

      - name: due_date
        description: Contractual invoice due date.
        tests:
          - not_null

      - name: currency
        description: Invoice transaction currency after uppercase normalisation.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - GBP
                  - USD
                  - EUR
                  - SGD
                  - AUD
                  - CAD

      - name: invoice_total_local
        description: Invoice total including tax in local currency.
        tests:
          - not_null

      - name: invoice_total_gbp
        description: Invoice total including tax translated into GBP.
        tests:
          - not_null

      - name: paid_amount_local
        description: Amount paid against the invoice in local currency at snapshot date.
        tests:
          - not_null

      - name: paid_amount_gbp
        description: Amount paid against the invoice translated into GBP at snapshot date.
        tests:
          - not_null

      - name: open_amount_local
        description: Remaining open invoice balance in local currency at snapshot date.
        tests:
          - not_null

      - name: open_amount_gbp
        description: Remaining open invoice balance translated into GBP at snapshot date.
        tests:
          - not_null

      - name: days_past_due
        description: Number of days the invoice is past due at snapshot date.
        tests:
          - not_null

      - name: ageing_bucket
        description: AR ageing bucket assigned at snapshot date.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - Closed
                  - Current
                  - 1-30
                  - 31-60
                  - 61-90
                  - 91-120
                  - 120+
                  - Overpaid

      - name: ar_status
        description: AR settlement status at snapshot date.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - Closed
                  - Open
                  - Written Off
                  - Overpaid

      - name: collection_status
        description: Collection management status at snapshot date.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - Closed
                  - Not Due
                  - Overdue
                  - Payment Plan
                  - Disputed
                  - Write-Off Candidate
                  - Written Off
                  - Overpaid

      - name: is_disputed
        description: Boolean flag indicating whether the invoice is disputed at snapshot date.
        tests:
          - not_null

      - name: is_writeoff_candidate
        description: Boolean flag indicating whether the invoice is a write-off candidate at snapshot date.
        tests:
          - not_null

      - name: source_system
        description: Source system responsible for the AR ageing snapshot.
        tests:
          - not_null

      - name: is_defect
        description: Boolean flag indicating whether the AR ageing row contains an intentional source defect.
        tests:
          - not_null

      - name: defect_type
        description: Optional defect classification carried from the source layer.

      - name: created_date
        description: Source-system creation date parsed from Bronze VARCHAR.
        tests:
          - not_null

      - name: updated_date
        description: Source-system update date parsed from Bronze VARCHAR.
        tests:
          - not_null

      - name: _atlas_row_hash
        description: Bronze deterministic source-row fingerprint carried into Silver for lineage and drift analysis.
        tests:
          - not_null

      - name: _atlas_ingested_at
        description: UTC timestamp when the source row was loaded into Bronze.
        tests:
          - not_null

      - name: _atlas_source_file
        description: Origin CSV filename from the Bronze ingestion process.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - ar_ageing_snapshot.csv
