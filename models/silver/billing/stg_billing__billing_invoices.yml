version: 2

models:
  - name: stg_billing__billing_invoices
    description: >
      Silver staging model for billing invoice headers. This model reads the raw
      Bronze billing__billing_invoices source, applies defensive casting to
      invoice dates, billing period dates, due dates, local and GBP monetary
      fields, tax rates, defect flags, and operational dates while preserving
      Atlas Bronze lineage metadata. The grain is one row per billing invoice.

    config:
      materialized: view
      schema: silver
      tags:
        - silver
        - staging
        - billing
        - invoices

    columns:
      - name: invoice_pk
        description: Stable primary key for the invoice header record.
        tests:
          - not_null
          - unique

      - name: invoice_id
        description: Business invoice identifier used across invoice lines, payments, allocations, and AR ageing.
        tests:
          - not_null
          - unique

      - name: customer_id
        description: Customer identifier linked to the billing customer registry.
        tests:
          - not_null

      - name: invoice_date
        description: Date the invoice was issued.
        tests:
          - not_null

      - name: billing_period_start_date
        description: Start date of the billing period covered by the invoice.
        tests:
          - not_null

      - name: billing_period_end_date
        description: End date of the billing period covered by the invoice.
        tests:
          - not_null

      - name: due_date
        description: Contractual invoice due date.
        tests:
          - not_null

      - name: payment_terms
        description: Payment terms applied to the invoice.
        tests:
          - not_null

      - name: invoice_status
        description: Invoice lifecycle status.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                - Draft
                - Open
                - Issued
                - Paid
                - Partially Paid
                - Overdue
                - Void
                - Disputed
                - Written Off

      - name: currency
        description: Invoice transaction currency after uppercase normalisation.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - GBP
                  - USD
                  - EUR
                  - SGD
                  - AUD
                  - CAD

      - name: subtotal_local
        description: Invoice subtotal before tax in local currency.
        tests:
          - not_null

      - name: tax_rate
        description: Tax rate applied to the invoice.
        tests:
          - not_null

      - name: tax_amount_local
        description: Tax amount in local currency.
        tests:
          - not_null

      - name: total_local
        description: Invoice total including tax in local currency.
        tests:
          - not_null

      - name: subtotal_gbp
        description: Invoice subtotal before tax translated into GBP.
        tests:
          - not_null

      - name: tax_amount_gbp
        description: Tax amount translated into GBP.
        tests:
          - not_null

      - name: total_gbp
        description: Invoice total including tax translated into GBP.
        tests:
          - not_null

      - name: source_system
        description: Source system responsible for the invoice header.
        tests:
          - not_null

      - name: is_defect
        description: Boolean flag indicating whether the invoice contains an intentional source defect.
        tests:
          - not_null

      - name: defect_type
        description: Optional defect classification carried from the source layer.

      - name: created_date
        description: Source-system creation date parsed from Bronze VARCHAR.
        tests:
          - not_null

      - name: updated_date
        description: Source-system update date parsed from Bronze VARCHAR.
        tests:
          - not_null

      - name: _atlas_row_hash
        description: Bronze deterministic source-row fingerprint carried into Silver for lineage and drift analysis.
        tests:
          - not_null

      - name: _atlas_ingested_at
        description: UTC timestamp when the source row was loaded into Bronze.
        tests:
          - not_null

      - name: _atlas_source_file
        description: Origin CSV filename from the Bronze ingestion process.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - billing_invoices.csv
