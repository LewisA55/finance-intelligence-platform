version: 2

models:
  - name: stg_billing__billing_payments
    description: >
      Silver staging model for billing payment transactions. This model reads
      the raw Bronze billing__billing_payments source, applies defensive casting
      to payment dates, payment amounts, currencies, defect flags, and
      operational dates while preserving Atlas Bronze lineage metadata. The
      grain is one row per cash receipt / payment transaction.

    config:
      materialized: view
      schema: silver
      tags:
        - silver
        - staging
        - billing
        - payments

    columns:
      - name: payment_pk
        description: Stable primary key for the payment transaction record.
        tests:
          - not_null
          - unique

      - name: payment_id
        description: Business payment identifier.
        tests:
          - not_null
          - unique

      - name: customer_id
        description: Customer identifier linked to the billing customer registry.
        tests:
          - not_null

      - name: payment_date
        description: Date the payment was received or recorded.
        tests:
          - not_null

      - name: payment_method
        description: Method used to collect the payment.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - Bank Transfer
                  - Card
                  - Direct Debit
                  - ACH
                  - Wire
                  - Credit Memo
                  - Manual Adjustment

      - name: payment_reference
        description: Optional bank, processor, or operational payment reference.

      - name: currency
        description: Payment transaction currency after uppercase normalisation.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - GBP
                  - USD
                  - EUR
                  - SGD
                  - AUD
                  - CAD

      - name: payment_amount_local
        description: Payment amount in local transaction currency.
        tests:
          - not_null

      - name: payment_amount_gbp
        description: Payment amount translated into GBP.
        tests:
          - not_null

      - name: bank_account_region
        description: Region of the bank account receiving the payment.
        tests:
          - not_null

      - name: payment_status
        description: Payment lifecycle status.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - Received
                  - Fully Applied
                  - Applied
                  - Partially Applied
                  - Unapplied
                  - Failed
                  - Reversed
                  - Refunded
                  - Pending
      - name: source_system
        description: Source system responsible for the payment transaction.
        tests:
          - not_null

      - name: is_defect
        description: Boolean flag indicating whether the payment contains an intentional source defect.
        tests:
          - not_null

      - name: defect_type
        description: Optional defect classification carried from the source layer.

      - name: created_date
        description: Source-system creation date parsed from Bronze VARCHAR.
        tests:
          - not_null

      - name: updated_date
        description: Source-system update date parsed from Bronze VARCHAR.
        tests:
          - not_null

      - name: _atlas_row_hash
        description: Bronze deterministic source-row fingerprint carried into Silver for lineage and drift analysis.
        tests:
          - not_null

      - name: _atlas_ingested_at
        description: UTC timestamp when the source row was loaded into Bronze.
        tests:
          - not_null

      - name: _atlas_source_file
        description: Origin CSV filename from the Bronze ingestion process.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - billing_payments.csv
