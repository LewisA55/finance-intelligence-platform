version: 2

models:
  - name: stg_billing__billing_subscription_events
    description: >
      Silver staging model for the billing subscription event ledger. This model
      reads the raw Bronze billing__billing_subscription_events source, applies
      defensive casting to event sequencing, event dates, MRR/ARR before-and-after
      values, ARR/MRR deltas, terminal-event flags, defect flags, and operational
      dates while preserving Atlas Bronze lineage metadata. The grain is one row
      per subscription lifecycle event.

    config:
      materialized: view
      schema: silver
      tags:
        - silver
        - staging
        - billing
        - subscription_events

    columns:
      - name: event_pk
        description: Stable primary key for the subscription event record.
        tests:
          - not_null
          - unique

      - name: event_id
        description: Business event identifier for the subscription lifecycle event.
        tests:
          - not_null
          - unique

      - name: subscription_id
        description: Subscription identifier linked to the subscription master.
        tests:
          - not_null

      - name: customer_id
        description: Customer identifier linked to the billing customer registry.
        tests:
          - not_null

      - name: event_sequence
        description: Sequence number of the event within the subscription lifecycle.
        tests:
          - not_null

      - name: event_date
        description: Effective date of the subscription lifecycle event.
        tests:
          - not_null

      - name: event_type
        description: Subscription lifecycle event type.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - New
                  - Renewal
                  - Expansion
                  - Contraction
                  - Price Increase
                  - Churn
                  - Pause

      - name: event_reason
        description: Optional event reason or commercial driver.

      - name: previous_mrr_local
        description: Previous monthly recurring revenue before the event in local currency.
        tests:
          - not_null

      - name: new_mrr_local
        description: New monthly recurring revenue after the event in local currency.
        tests:
          - not_null

      - name: mrr_delta_local
        description: Monthly recurring revenue movement caused by the event in local currency.
        tests:
          - not_null

      - name: previous_mrr_gbp
        description: Previous monthly recurring revenue before the event in GBP.
        tests:
          - not_null

      - name: new_mrr_gbp
        description: New monthly recurring revenue after the event in GBP.
        tests:
          - not_null

      - name: mrr_delta_gbp
        description: Monthly recurring revenue movement caused by the event in GBP.
        tests:
          - not_null

      - name: previous_arr_local
        description: Previous annual recurring revenue before the event in local currency.
        tests:
          - not_null

      - name: new_arr_local
        description: New annual recurring revenue after the event in local currency.
        tests:
          - not_null

      - name: arr_delta_local
        description: Annual recurring revenue movement caused by the event in local currency.
        tests:
          - not_null

      - name: previous_arr_gbp
        description: Previous annual recurring revenue before the event in GBP.
        tests:
          - not_null

      - name: new_arr_gbp
        description: New annual recurring revenue after the event in GBP.
        tests:
          - not_null

      - name: arr_delta_gbp
        description: Annual recurring revenue movement caused by the event in GBP.
        tests:
          - not_null

      - name: currency
        description: Subscription event currency after uppercase normalisation.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - GBP
                  - USD
                  - EUR
                  - SGD
                  - AUD
                  - CAD

      - name: source_system
        description: Source system responsible for the event record.
        tests:
          - not_null

      - name: is_terminal_event
        description: Boolean flag indicating whether the event terminates or pauses the active subscription state.
        tests:
          - not_null

      - name: is_defect
        description: Boolean flag indicating whether the event row contains an intentional source defect.
        tests:
          - not_null

      - name: defect_type
        description: Optional defect classification carried from the source layer.

      - name: created_date
        description: Source-system creation date parsed from Bronze VARCHAR.
        tests:
          - not_null

      - name: updated_date
        description: Source-system update date parsed from Bronze VARCHAR.
        tests:
          - not_null

      - name: _atlas_row_hash
        description: Bronze deterministic source-row fingerprint carried into Silver for lineage and drift analysis.
        tests:
          - not_null

      - name: _atlas_ingested_at
        description: UTC timestamp when the source row was loaded into Bronze.
        tests:
          - not_null

      - name: _atlas_source_file
        description: Origin CSV filename from the Bronze ingestion process.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - billing_subscription_events.csv
