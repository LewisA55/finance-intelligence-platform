version: 2

models:
  - name: stg_hris__hr_headcount_snapshot
    description: >
      Silver staging model for the HRIS monthly headcount snapshot. This model
      reads the raw Bronze hris__hr_headcount_snapshot source and applies
      defensive casting to snapshot month, organisational assignment, employment
      status, monthly salary fields, FTE count, active flag, ghost-headcount flag,
      and Atlas lineage metadata. The grain is one row per employee per snapshot
      month.

    config:
      materialized: view
      schema: silver
      tags:
        - silver
        - staging
        - hris
        - headcount

    columns:
      - name: employee_id
        description: Business identifier for the employee represented in the snapshot.
        tests:
          - not_null

      - name: snapshot_month
        description: Month represented by the HRIS headcount snapshot row.
        tests:
          - not_null

      - name: department_id
        description: Department identifier assigned to the employee during the snapshot month.
        tests:
          - not_null

      - name: department_code
        description: Department code assigned to the employee during the snapshot month.
        tests:
          - not_null

      - name: functional_group
        description: Functional group assigned to the employee during the snapshot month.
        tests:
          - not_null

      - name: region_id
        description: Region identifier assigned to the employee during the snapshot month.
        tests:
          - not_null

      - name: currency_code
        description: Employee compensation currency after uppercase normalisation.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - GBP
                  - USD
                  - EUR
                  - SGD

      - name: job_level
        description: Job level or grade assigned to the employee during the snapshot month.
        tests:
          - not_null

      - name: employment_status
        description: Employment lifecycle status during the snapshot month.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - Active
                  - Terminated
                  - On Leave
                  - Future Hire

      - name: monthly_salary_local
        description: Monthly salary amount in local compensation currency.
        tests:
          - not_null

      - name: monthly_salary_gbp
        description: Monthly salary amount translated into GBP.
        tests:
          - not_null

      - name: fte_count
        description: Full-time equivalent headcount represented by the snapshot row.
        tests:
          - not_null

      - name: is_active
        description: Boolean active flag for the employee in the snapshot month.
        tests:
          - not_null

      - name: is_ghost_headcount
        description: Boolean flag indicating intentional ghost-headcount data-quality population.
        tests:
          - not_null

      - name: _atlas_row_hash
        description: Bronze deterministic source-row fingerprint carried into Silver for lineage and drift analysis.
        tests:
          - not_null

      - name: _atlas_ingested_at
        description: UTC timestamp when the source row was loaded into Bronze.
        tests:
          - not_null

      - name: _atlas_source_file
        description: Origin CSV filename from the Bronze ingestion process.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - hr_headcount_snapshot.csv

