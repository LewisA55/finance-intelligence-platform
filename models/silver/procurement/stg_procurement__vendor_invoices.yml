version: 2

models:
  - name: stg_procurement__vendor_invoices
    description: >
      Silver staging model for Procurement vendor invoice headers. This model
      reads the raw Bronze procurement__vendor_invoices source and applies
      defensive casting to invoice dates, due dates, posting dates, posting
      periods, local and GBP financial amounts, tax rates, payment status,
      defect flags, and Atlas lineage metadata. The grain is one row per vendor
      invoice header.

    config:
      materialized: view
      schema: silver
      tags:
        - silver
        - staging
        - procurement
        - ap
        - vendor_invoices

    columns:
      - name: vendor_invoice_pk
        description: Stable primary key for the vendor invoice header row.
        tests:
          - not_null
          - unique

      - name: vendor_invoice_id
        description: Business identifier for the vendor invoice.
        tests:
          - not_null
          - unique

      - name: vendor_id
        description: Vendor identifier linked to the Procurement vendor master.
        tests:
          - not_null

      - name: vendor_name
        description: Vendor name carried on the invoice header.
        tests:
          - not_null

      - name: invoice_number
        description: Vendor-issued invoice number.
        tests:
          - not_null

      - name: invoice_date
        description: Date shown on the vendor invoice.
        tests:
          - not_null

      - name: due_date
        description: Invoice due date based on vendor payment terms.
        tests:
          - not_null

      - name: posting_date
        description: Date the invoice was posted to the AP subledger.
        tests:
          - not_null

      - name: posting_period
        description: Accounting month to which the vendor invoice was posted.
        tests:
          - not_null

      - name: currency
        description: Vendor invoice transaction currency after uppercase normalisation.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - GBP
                  - USD
                  - EUR
                  - SGD
                  - AUD
                  - CAD

      - name: subtotal_local
        description: Vendor invoice subtotal excluding tax in local currency.
        tests:
          - not_null

      - name: tax_rate
        description: Tax rate applied to the vendor invoice.
        tests:
          - not_null

      - name: tax_amount_local
        description: Vendor invoice tax amount in local currency.
        tests:
          - not_null

      - name: total_local
        description: Vendor invoice gross total in local currency.
        tests:
          - not_null

      - name: subtotal_gbp
        description: Vendor invoice subtotal excluding tax translated into GBP.
        tests:
          - not_null

      - name: tax_amount_gbp
        description: Vendor invoice tax amount translated into GBP.
        tests:
          - not_null

      - name: total_gbp
        description: Vendor invoice gross total translated into GBP.
        tests:
          - not_null

      - name: payment_status
        description: AP payment lifecycle status for the vendor invoice.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - Open
                  - Unpaid
                  - Partially Paid
                  - Paid
                  - Overdue
                  - Written Off
                  - Cancelled
                  - On Hold

      - name: source_system
        description: Source system responsible for the vendor invoice header.
        tests:
          - not_null

      - name: is_defect
        description: Boolean flag indicating whether the invoice row contains an intentional source defect.
        tests:
          - not_null

      - name: defect_type
        description: Optional defect classification carried from the source layer.

      - name: created_date
        description: Source-system creation date parsed from Bronze VARCHAR.
        tests:
          - not_null

      - name: updated_date
        description: Source-system update date parsed from Bronze VARCHAR.
        tests:
          - not_null

      - name: _atlas_row_hash
        description: Bronze deterministic source-row fingerprint carried into Silver for lineage and drift analysis.
        tests:
          - not_null

      - name: _atlas_ingested_at
        description: UTC timestamp when the source row was loaded into Bronze.
        tests:
          - not_null

      - name: _atlas_source_file
        description: Origin CSV filename from the Bronze ingestion process.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - vendor_invoices.csv
