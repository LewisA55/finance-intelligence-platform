version: 2

models:
  - name: stg_workforce__employee_compensation
    description: >
      Silver staging model for workforce employee compensation. This model reads
      the raw Bronze workforce__employee_compensation source and applies
      defensive casting to posting periods, pay period dates, employee and
      organisational assignment keys, compensation components, salary baselines,
      component rates, local and GBP amounts, FX rates, system-generated flags,
      defect flags, and Atlas lineage metadata. The grain is one row per
      employee per posting period per compensation component.

    config:
      materialized: view
      schema: silver
      tags:
        - silver
        - staging
        - workforce
        - compensation

    columns:
      - name: compensation_pk
        description: Stable primary key for the compensation source row.
        tests:
          - not_null
          - unique

      - name: compensation_line_id
        description: Business identifier for the compensation line.
        tests:
          - not_null
          - unique

      - name: employee_id
        description: Employee identifier linked to the HRIS employee master.
        tests:
          - not_null

      - name: posting_period
        description: Accounting month for the compensation line, derived from period_start_date month start.
        tests:
          - not_null

      - name: period_start_date
        description: Start date of the compensation period.
        tests:
          - not_null

      - name: period_end_date
        description: End date of the compensation period.
        tests:
          - not_null

      - name: department_id
        description: Department identifier used for workforce cost attribution.
        tests:
          - not_null

      - name: region_id
        description: Region identifier used for workforce cost attribution.
        tests:
          - not_null

      - name: country_code
        description: Country code for the employee compensation row.
        tests:
          - not_null

      - name: currency
        description: Compensation transaction currency after uppercase normalisation.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - GBP
                  - USD
                  - EUR
                  - SGD

      - name: compensation_component
        description: Compensation component represented by the line.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - BASE_SALARY
                  - EMPLOYER_TAX
                  - BENEFITS
                  - BONUS_ACCRUAL

      - name: annual_base_salary_local
        description: Annual base salary in local currency.
        tests:
          - not_null

      - name: monthly_base_salary_local
        description: Monthly base salary in local currency.
        tests:
          - not_null

      - name: component_rate
        description: Rate applied to calculate the compensation component.
        tests:
          - not_null

      - name: amount_local
        description: Compensation component amount in local currency.
        tests:
          - not_null

      - name: amount_gbp
        description: Compensation component amount translated into GBP.
        tests:
          - not_null

      - name: fx_rate_to_gbp
        description: FX rate used to translate the local amount into GBP.
        tests:
          - not_null

      - name: source_system
        description: Source system responsible for the compensation line.
        tests:
          - not_null

      - name: is_system_generated
        description: Boolean flag indicating whether the line was generated by the workforce cost engine.
        tests:
          - not_null

      - name: is_defect
        description: Boolean flag indicating whether the compensation line contains an intentional source defect.
        tests:
          - not_null

      - name: defect_type
        description: Optional defect classification carried from the source layer.

      - name: created_date
        description: Source-system creation date parsed from Bronze VARCHAR.
        tests:
          - not_null

      - name: updated_date
        description: Source-system update date parsed from Bronze VARCHAR.
        tests:
          - not_null

      - name: _atlas_row_hash
        description: Bronze deterministic source-row fingerprint carried into Silver for lineage and drift analysis.
        tests:
          - not_null

      - name: _atlas_ingested_at
        description: UTC timestamp when the source row was loaded into Bronze.
        tests:
          - not_null

      - name: _atlas_source_file
        description: Origin CSV filename from the Bronze ingestion process.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - employee_compensation.csv
