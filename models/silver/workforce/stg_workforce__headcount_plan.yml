version: 2

models:
  - name: stg_workforce__headcount_plan
    description: >
      Silver staging model for the authorised workforce headcount plan. This
      model reads the raw Bronze workforce__headcount_plan source and applies
      defensive casting to position identifiers, employee assignment, plan
      status, organisational assignment, role family, seniority, planned hire
      timing, salary band amounts, FX rates, backfill flags, system-generated
      flags, defect flags, and Atlas lineage metadata. The grain is one row per
      planned position / authorised headcount slot.

    config:
      materialized: view
      schema: silver
      tags:
        - silver
        - staging
        - workforce
        - headcount_plan

    columns:
      - name: position_pk
        description: Stable primary key for the planned position row.
        tests:
          - not_null
          - unique

      - name: position_id
        description: Business identifier for the planned position.
        tests:
          - not_null
          - unique

      - name: employee_id
        description: Employee identifier assigned to the planned position, where the position is filled.

      - name: plan_status
        description: Current status of the planned position.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - ACTIVE
                  - OPEN_BUDGETED
                  - BACKFILL

      - name: department_id
        description: Department identifier assigned to the planned position.
        tests:
          - not_null

      - name: region_id
        description: Region identifier assigned to the planned position.
        tests:
          - not_null

      - name: country_code
        description: Country code assigned to the planned position.
        tests:
          - not_null

      - name: currency
        description: Planning currency after uppercase normalisation.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - GBP
                  - USD
                  - EUR
                  - SGD

      - name: role_family
        description: Workforce planning role family.
        tests:
          - not_null

      - name: seniority_level
        description: Seniority level assigned to the planned position.
        tests:
          - not_null

      - name: planned_hire_date
        description: Planned hire date for the position, required for open budgeted and backfill positions.
        tests:
          - not_null:
              config:
                where: "plan_status in ('OPEN_BUDGETED', 'BACKFILL')"

      - name: planned_start_period
        description: Planned monthly start period for the position, derived from planned_hire_date month start for open budgeted and backfill positions.
        tests:
          - not_null:
              config:
                where: "plan_status in ('OPEN_BUDGETED', 'BACKFILL')"

      - name: target_salary_low_local
        description: Low end of the target salary band in local currency.
        tests:
          - not_null

      - name: target_salary_mid_local
        description: Midpoint of the target salary band in local currency.
        tests:
          - not_null

      - name: target_salary_high_local
        description: High end of the target salary band in local currency.
        tests:
          - not_null

      - name: target_salary_mid_gbp
        description: Midpoint of the target salary band translated into GBP.
        tests:
          - not_null

      - name: fx_rate_to_gbp
        description: FX rate used to translate the local salary midpoint into GBP.
        tests:
          - not_null

      - name: is_backfill
        description: Boolean flag indicating whether the planned position is a backfill.
        tests:
          - not_null

      - name: source_system
        description: Source system responsible for the headcount plan row.
        tests:
          - not_null

      - name: is_system_generated
        description: Boolean flag indicating whether the planned position was generated by the workforce planning engine.
        tests:
          - not_null

      - name: is_defect
        description: Boolean flag indicating whether the planned position contains an intentional source defect.
        tests:
          - not_null

      - name: defect_type
        description: Optional defect classification carried from the source layer.

      - name: created_date
        description: Source-system creation date parsed from Bronze VARCHAR.
        tests:
          - not_null

      - name: updated_date
        description: Source-system update date parsed from Bronze VARCHAR.
        tests:
          - not_null

      - name: _atlas_row_hash
        description: Bronze deterministic source-row fingerprint carried into Silver for lineage and drift analysis.
        tests:
          - not_null

      - name: _atlas_ingested_at
        description: UTC timestamp when the source row was loaded into Bronze.
        tests:
          - not_null

      - name: _atlas_source_file
        description: Origin CSV filename from the Bronze ingestion process.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - headcount_plan.csv
