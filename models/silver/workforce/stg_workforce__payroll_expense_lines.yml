version: 2

models:
  - name: stg_workforce__payroll_expense_lines
    description: >
      Silver staging model for actual payroll expense lines. This model reads
      the raw Bronze workforce__payroll_expense_lines source and applies
      defensive casting to posting periods, pay period dates, department and GL
      account attribution, payroll cost components, employee counts, local and
      GBP debit/credit values, system-generated flags, defect flags, and Atlas
      lineage metadata. The grain is one payroll expense posting line by period,
      department, account, and cost component.

    config:
      materialized: view
      schema: silver
      tags:
        - silver
        - staging
        - workforce
        - payroll_actuals

    columns:
      - name: payroll_expense_pk
        description: Stable primary key for the payroll expense source row.
        tests:
          - not_null
          - unique

      - name: payroll_expense_line_id
        description: Business identifier for the payroll expense line.
        tests:
          - not_null
          - unique

      - name: posting_period
        description: Accounting month for the payroll expense line.
        tests:
          - not_null

      - name: period_start_date
        description: Start date of the payroll expense period.
        tests:
          - not_null

      - name: period_end_date
        description: End date of the payroll expense period.
        tests:
          - not_null

      - name: department_id
        description: Department identifier used for payroll cost attribution.
        tests:
          - not_null

      - name: account_code
        description: GL account code used for payroll expense posting.
        tests:
          - not_null

      - name: account_name
        description: GL account name used for payroll expense posting.
        tests:
          - not_null

      - name: currency
        description: Payroll transaction currency after uppercase normalisation.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - GBP
                  - USD
                  - EUR
                  - SGD

      - name: cost_component
        description: Payroll actuals cost component represented by the line.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - BASE_SALARY
                  - EMPLOYER_TAX
                  - BENEFITS
                  - BONUS_ACCRUAL

      - name: employee_count
        description: Number of employees represented by the payroll expense line.
        tests:
          - not_null

      - name: debit_local
        description: Debit amount in local payroll currency.
        tests:
          - not_null

      - name: credit_local
        description: Credit amount in local payroll currency.
        tests:
          - not_null

      - name: debit_gbp
        description: Debit amount translated into GBP.
        tests:
          - not_null

      - name: credit_gbp
        description: Credit amount translated into GBP.
        tests:
          - not_null

      - name: net_amount_local
        description: Net payroll amount in local currency, calculated as debit_local minus credit_local.
        tests:
          - not_null

      - name: net_amount_gbp
        description: Net payroll amount in GBP, calculated as debit_gbp minus credit_gbp.
        tests:
          - not_null

      - name: source_system
        description: Source system responsible for the payroll expense line.
        tests:
          - not_null

      - name: is_system_generated
        description: Boolean flag indicating whether the payroll expense line was generated by the payroll actuals engine.
        tests:
          - not_null

      - name: is_defect
        description: Boolean flag indicating whether the payroll expense line contains an intentional source defect.
        tests:
          - not_null

      - name: defect_type
        description: Optional defect classification carried from the source layer.

      - name: created_date
        description: Source-system creation date parsed from Bronze VARCHAR.
        tests:
          - not_null

      - name: updated_date
        description: Source-system update date parsed from Bronze VARCHAR.
        tests:
          - not_null

      - name: _atlas_row_hash
        description: Bronze deterministic source-row fingerprint carried into Silver for lineage and drift analysis.
        tests:
          - not_null

      - name: _atlas_ingested_at
        description: UTC timestamp when the source row was loaded into Bronze.
        tests:
          - not_null

      - name: _atlas_source_file
        description: Origin CSV filename from the Bronze ingestion process.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - payroll_expense_lines.csv
